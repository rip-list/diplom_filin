<!DOCTYPE html>
<html>
<head>
    <title>Обработка текста из PDF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2>Извлечённый текст</h2>
        <p>Отредактируйте текст, если нужно.<br>
        <small>Формат: каждый блок вопрос-ответ отделён пустой строкой. Первая строка блока – вопрос, остальные – ответ.</small></p>
        <form method="post" action="{{ url_for('process_pdf') }}">
            <div class="mb-3">
                <textarea class="form-control" name="edited_text" rows="20">{{ raw_text }}</textarea>
            </div>
            <button type="submit" class="btn btn-success">Разобрать и добавить в базу</button>
            <a href="{{ url_for('upload_pdf') }}" class="btn btn-secondary">Назад</a>
        </form>
    </div>
</body>
</html>
