<!DOCTYPE html>
<html>
<head>
    <title>Загрузка PDF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2>Загрузка PDF с вопросами</h2>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="pdf_file" class="form-label">Выберите PDF-файл</label>
                <input type="file" class="form-control" id="pdf_file" name="pdf_file" accept=".pdf" required>
            </div>
            <button type="submit" class="btn btn-primary">Загрузить и извлечь текст</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Назад к списку</a>
        </form>
    </div>
</body>
</html>
